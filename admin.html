<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin EriPlay | v7.0 Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --primary: #001f3f; --accent: #e5c05b; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 120px; }
        header.admin-nav { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); margin-bottom: 30px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .section-box { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 25px; background: #fafafa; }
        h3 { color: var(--primary); border-left: 6px solid var(--accent); padding-left: 15px; text-transform: uppercase; font-size: 1.1rem; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 900; font-size: 0.8rem; color: #555; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        .dynamic-item { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .btn-add { background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 900; margin-bottom: 20px; }
        .btn-save-master { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: var(--accent); border: 3px solid var(--accent); padding: 20px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .preview-img { width: 100px; height: 70px; object-fit: cover; border-radius: 8px; background: #eee; }
    </style>
</head>
<body>

<header class="admin-nav">
    <h1>Painel EriPlay v7.0</h1>
    <p>Configurações preservadas e suporte a Shorts</p>
</header>

<div class="container">
    <h3>1. Dados do Profissional</h3>
    <div class="section-box">
        <label>Nome Completo</label><input type="text" id="in-nome">
        <label>OAB / Registro</label><input type="text" id="in-oab">
        <label>Slogan</label><input type="text" id="in-slogan">
        <label>Biografia</label><textarea id="in-sobre" rows="4"></textarea>
    </div>

    <h3>2. Áreas de Atuação (Serviços)</h3>
    <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">Use ícones do FontAwesome (ex: fas fa-gavel)</p>
    <button class="btn-add" onclick="addArea()">+ Adicionar Nova Área</button>
    <div id="area-list"></div>

    <h3>3. Publicações (YouTube, Shorts e Instagram)</h3>
    <div id="pub-grid"></div>

    <h3>4. Estilo Visual</h3>
    <div class="section-box">
        <label>Tema do Site</label>
        <select id="in-tema">
            <option value="tema-advogado">Advocacia (Ouro Marinho)</option>
            <option value="tema-gamer">Gamer (EriPlay Style)</option>
            <option value="tema-cyberpunk">Cyberpunk</option>
            <option value="tema-engenheiro">Engenharia</option>
            <option value="tema-medico">Medicina</option>
            <option value="tema-psicologo">Psicologia</option>
            <option value="tema-contador">Contabilidade</option>
            <option value="tema-nutri">Nutrição</option>
            <option value="tema-estetica">Estética</option>
            <option value="tema-arquiteto">Arquitetura</option>
        </select>
    </div>
</div>

<button class="btn-save-master" onclick="saveMaster()">SALVAR ALTERAÇÕES</button>

<script>
    // Carrega dados ou define os PADRÕES do seu site atual
    const defaultAreas = [
        {t:'Direito Civil', d:'Contratos, indenizações e direitos civis.', i:'fas fa-gavel'},
        {t:'Direito Criminal', d:'Defesa e consultoria penal.', i:'fas fa-user-shield'},
        {t:'Previdenciário', d:'Aposentadorias e benefícios INSS.', i:'fas fa-hand-holding-medical'},
        {t:'Família', d:'Divórcio, guarda e pensão.', i:'fas fa-users'},
        {t:'Sucessório', d:'Inventários e partilhas.', i:'fas fa-file-signature'}
    ];

    let db = JSON.parse(localStorage.getItem('siteData')) || {
        areas: defaultAreas,
        pubs: Array(6).fill({l:"", d:""}),
        nome: "Gleyciane Bento de Araújo",
        oab: "OAB/SP 473.457",
        slogan: "Defendendo seus direitos com excelência",
        tema: "tema-advogado"
    };

    function renderAll() {
        // Áreas de Atuação
        const areaDiv = document.getElementById('area-list');
        areaDiv.innerHTML = db.areas.map((a, i) => `
            <div class="dynamic-item">
                <input type="text" placeholder="Ícone" value="${a.i}" oninput="db.areas[${i}].i=this.value" style="width:15%">
                <input type="text" placeholder="Título" value="${a.t}" oninput="db.areas[${i}].t=this.value" style="width:25%">
                <input type="text" placeholder="Descrição" value="${a.d}" oninput="db.areas[${i}].d=this.value" style="width:45%">
                <button onclick="db.areas.splice(${i},1); renderAll()" style="background:red; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer">Lixeira</button>
            </div>
        `).join('');

        // Publicações
        document.getElementById('pub-grid').innerHTML = db.pubs.map((p, i) => `
            <div class="dynamic-item">
                <div style="width:100%"><strong>Publicação ${i+1}</strong></div>
                <input type="text" placeholder="Descrição" value="${p.d}" oninput="db.pubs[${i}].d=this.value" style="width:40%">
                <input type="text" placeholder="Link YouTube/Shorts/Insta" value="${p.l}" oninput="db.pubs[${i}].l=this.value" style="width:55%">
            </div>
        `).join('');
    }

    function addArea() { db.areas.push({t:"Novo Serviço", d:"Descrição do serviço", i:"fas fa-briefcase"}); renderAll(); }

    function saveMaster() {
        db.nome = document.getElementById('in-nome').value;
        db.oab = document.getElementById('in-oab').value;
        db.slogan = document.getElementById('in-slogan').value;
        db.sobre = document.getElementById('in-sobre').value;
        db.tema = document.getElementById('in-tema').value;

        localStorage.setItem('siteData', JSON.stringify(db));
        alert("SITE ATUALIZADO!");
        window.location.href = 'index.html';
    }

    window.onload = () => {
        document.getElementById('in-nome').value = db.nome;
        document.getElementById('in-oab').value = db.oab;
        document.getElementById('in-slogan').value = db.slogan;
        document.getElementById('in-sobre').value = db.sobre || "";
        document.getElementById('in-tema').value = db.tema;
        renderAll();
    };
</script>
</body>
</html>
