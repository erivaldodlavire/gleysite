<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin EriPlay | v8.0 Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --primary: #001f3f; --accent: #e5c05b; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 120px; }
        header.admin-nav { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); margin-bottom: 30px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .section-box { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 25px; background: #fafafa; }
        h3 { color: var(--primary); border-left: 6px solid var(--accent); padding-left: 15px; text-transform: uppercase; font-size: 1.1rem; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 900; font-size: 0.75rem; color: #555; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        .dynamic-item { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        .btn-add { background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 900; margin-bottom: 20px; }
        .btn-save-master { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: var(--accent); border: 3px solid var(--accent); padding: 20px 50px; border-radius: 50px; font-weight: 900; cursor: pointer; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.3); font-size: 1.1rem; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header class="admin-nav">
    <h1>Painel de Controle Gleysite v8.0</h1>
    <p>Ajuste áreas, vídeos e redes sociais em tempo real</p>
</header>

<div class="container">
    <h3>1. Dados Gerais e Contato</h3>
    <div class="section-box">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div><label>Nome</label><input type="text" id="in-nome"></div>
            <div><label>OAB/Registro</label><input type="text" id="in-oab"></div>
        </div>
        <label>Slogan</label><input type="text" id="in-slogan">
        <label>Sobre Mim / Biografia</label><textarea id="in-sobre" rows="3"></textarea>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div><label>WhatsApp (Link ou Número)</label><input type="text" id="in-tel"></div>
            <div><label>E-mail</label><input type="text" id="in-email"></div>
        </div>
    </div>

    <h3>2. Áreas de Atuação (Serviços)</h3>
    <button class="btn-add" onclick="addArea()">+ Nova Área</button>
    <div id="area-list"></div>

    <h3>3. Redes Sociais (Facebook, Instagram, LinkedIn, etc.)</h3>
    <div id="social-grid" class="section-box"></div>

    <h3>4. YouTube & Publicações</h3>
    <div id="pub-grid"></div>

    <h3>5. Aparência</h3>
    <div class="section-box">
        <label>Tema Profissional</label>
        <select id="in-tema">
            <option value="tema-advogado">Advocacia (Ouro Marinho)</option>
            <option value="tema-gamer">Gamer (EriPlay)</option>
            <option value="tema-engenheiro">Engenharia</option>
            <option value="tema-psicologo">Psicologia</option>
        </select>
    </div>
</div>

<button class="btn-save-master" onclick="saveMaster()">SALVAR TUDO</button>

<script>
    const defaultAreas = [
        {t:'Direito Civil', d:'Contratos, indenizações e direitos civis.', i:'fas fa-gavel'},
        {t:'Direito Criminal', d:'Defesa e consultoria penal.', i:'fas fa-user-shield'},
        {t:'Previdenciário', d:'Aposentadorias e benefícios INSS.', i:'fas fa-hand-holding-medical'},
        {t:'Família', d:'Divórcio, guarda e pensão.', i:'fas fa-users'},
        {t:'Sucessório', d:'Inventários e partilhas.', i:'fas fa-file-signature'}
    ];

    let db = JSON.parse(localStorage.getItem('siteData')) || {
        areas: defaultAreas,
        redes: Array(4).fill(""),
        pubs: Array(6).fill({l:"", d:""}),
        tema: "tema-advogado"
    };

    // Garantir que não sumam as redes
    if(!db.redes || db.redes.length === 0) db.redes = Array(4).fill("");

    function renderAll() {
        // Áreas
        document.getElementById('area-list').innerHTML = db.areas.map((a, i) => `
            <div class="dynamic-item">
                <div style="flex:1"><label>Ícone (FontAwesome)</label><input type="text" value="${a.i}" oninput="db.areas[${i}].i=this.value"></div>
                <div style="flex:2"><label>Título</label><input type="text" value="${a.t}" oninput="db.areas[${i}].t=this.value"></div>
                <div style="flex:3"><label>Descrição</label><input type="text" value="${a.d}" oninput="db.areas[${i}].d=this.value"></div>
                <button class="btn-del" onclick="db.areas.splice(${i},1); renderAll()"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');

        // Redes Sociais
        document.getElementById('social-grid').innerHTML = db.redes.map((r, i) => `
            <label>Link Rede Social ${i+1}</label>
            <input type="text" value="${r}" oninput="db.redes[${i}]=this.value" placeholder="https://facebook.com/...">
        `).join('');

        // Publicações
        document.getElementById('pub-grid').innerHTML = db.pubs.map((p, i) => `
            <div class="dynamic-item">
                <div style="flex:1"><label>Título/Desc</label><input type="text" value="${p.d}" oninput="db.pubs[${i}].d=this.value"></div>
                <div style="flex:2"><label>Link YouTube/Shorts/Insta</label><input type="text" value="${p.l}" oninput="db.pubs[${i}].l=this.value"></div>
            </div>
        `).join('');
    }

    function addArea() { db.areas.push({t:"", d:"", i:"fas fa-star"}); renderAll(); }

    function saveMaster() {
        db.nome = document.getElementById('in-nome').value;
        db.oab = document.getElementById('in-oab').value;
        db.slogan = document.getElementById('in-slogan').value;
        db.sobre = document.getElementById('in-sobre').value;
        db.tel = document.getElementById('in-tel').value;
        db.email = document.getElementById('in-email').value;
        db.tema = document.getElementById('in-tema').value;

        localStorage.setItem('siteData', JSON.stringify(db));
        alert("SITE ATUALIZADO!");
        window.location.href = 'index.html';
    }

    window.onload = () => {
        document.getElementById('in-nome').value = db.nome || "Gleyciane Bento de Araújo";
        document.getElementById('in-oab').value = db.oab || "OAB/SP 473.457";
        document.getElementById('in-slogan').value = db.slogan || "";
        document.getElementById('in-sobre').value = db.sobre || "";
        document.getElementById('in-tel').value = db.tel || "";
        document.getElementById('in-email').value = db.email || "";
        document.getElementById('in-tema').value = db.tema || "tema-advogado";
        renderAll();
    };
</script>
</body>
</html>
