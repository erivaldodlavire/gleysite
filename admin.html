<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin EriPlay | v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --primary: #001f3f; --accent: #e5c05b; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 120px; }
        
        header.admin-nav { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); margin-bottom: 30px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 30px; }
        
        .section-box { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #fafafa; }
        h3 { color: var(--primary); border-left: 6px solid var(--accent); padding-left: 15px; text-transform: uppercase; font-size: 1.1rem; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: 900; font-size: 0.8rem; color: #555; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 8px; font-family: inherit; }

        .dynamic-item { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .btn-add { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; position: absolute; top: 10px; right: 10px; }

        .btn-save-master { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: var(--accent); border: 3px solid var(--accent); padding: 20px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header class="admin-nav">
    <h1>Painel de Controle Gleysite</h1>
    <p>Role para baixo para editar todas as seções</p>
</header>

<div class="container">
    <h3>1. Informações Gerais</h3>
    <div class="section-box">
        <label>Nome no Site</label><input type="text" id="in-nome">
        <label>Slogan</label><input type="text" id="in-slogan">
        <label>Sobre Mim</label><textarea id="in-sobre" rows="4"></textarea>
    </div>

    <h3>2. Áreas de Atuação</h3>
    <button class="btn-add" onclick="addArea()">+ Nova Área</button>
    <div id="area-list"></div>

    <h3>3. Redes Sociais</h3>
    <div id="social-grid" class="section-box"></div>

    <h3>4. Vídeos do YouTube</h3>
    <div id="pub-grid"></div>

    <h3>5. Estilo Visual</h3>
    <select id="in-tema">
        <option value="tema-advogado">Advocacia (Ouro Marinho)</option>
        <option value="tema-gamer">Gamer (Neon)</option>
        <option value="tema-cyberpunk">Cyberpunk</option>
    </select>
</div>

<button class="btn-save-master" onclick="saveMaster()">SALVAR TODAS AS ALTERAÇÕES</button>

<script>
    // Inicia os dados ou cria um padrão se estiver vazio
    let db = JSON.parse(localStorage.getItem('siteData')) || {
        areas: [{t:'Exemplo', d:'Descrição', i:'fas fa-star'}],
        redes: ["", "", ""],
        pubs: [{l:'', d:''}, {l:'', d:''}],
        fotos: {}
    };

    function renderAll() {
        // Renderiza Áreas
        document.getElementById('area-list').innerHTML = db.areas.map((a, i) => `
            <div class="dynamic-item">
                <button class="btn-del" onclick="db.areas.splice(${i},1); renderAll()">X</button>
                <input type="text" placeholder="Título" value="${a.t}" onchange="db.areas[${i}].t=this.value">
                <input type="text" placeholder="Descrição" value="${a.d}" onchange="db.areas[${i}].d=this.value">
            </div>
        `).join('');

        // Renderiza Redes (mostra 5 campos fixos para facilitar)
        if(db.redes.length < 5) db.redes = Array(5).fill("");
        document.getElementById('social-grid').innerHTML = db.redes.slice(0,5).map((r, i) => `
            <label>Link Social ${i+1}</label><input type="text" value="${r}" onchange="db.redes[${i}]=this.value">
        `).join('');

        // Renderiza Pubs
        document.getElementById('pub-grid').innerHTML = db.pubs.map((p, i) => `
            <div class="dynamic-item">
                <label>Link do Vídeo ${i+1}</label><input type="text" value="${p.l}" onchange="db.pubs[${i}].l=this.value">
                <label>Descrição</label><input type="text" value="${p.d}" onchange="db.pubs[${i}].d=this.value">
            </div>
        `).join('');
    }

    function addArea() { db.areas.push({t:'', d:'', i:'fas fa-star'}); renderAll(); }

    function saveMaster() {
        db.nome = document.getElementById('in-nome').value;
        db.slogan = document.getElementById('in-slogan').value;
        db.sobre = document.getElementById('in-sobre').value;
        db.tema = document.getElementById('in-tema').value;

        localStorage.setItem('siteData', JSON.stringify(db));
        alert("Site Atualizado com Sucesso!");
        window.location.href = 'index.html';
    }

    window.onload = () => {
        document.getElementById('in-nome').value = db.nome || '';
        document.getElementById('in-slogan').value = db.slogan || '';
        document.getElementById('in-sobre').value = db.sobre || '';
        document.getElementById('in-tema').value = db.tema || 'tema-advogado';
        renderAll();
    };
</script>
</body>
</html>
